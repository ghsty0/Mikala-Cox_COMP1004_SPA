<!DOCTYPE html>
<html>
	<!-- Connect JS & CSS files -->
	<head>
		<title> CATSWEEPER </title>
		<link rel="icon" type="pawIcon" href="assets/images/paw.png">
		<link rel="stylesheet" href="styles.css">
		<script src = "assets/scripts/main.js" defer="body" type = "module"></script>
	</head>

	<!-- Set title. Inform the user of intructions & controls. -->
	<body>
		<h1>Welcome To CatSweeper!</h1>

		<section>
			<h2> Traverse the blanket without waking up any of your cats! </h2>
			<p> Reveal all squares without revealing any cats. Look out for numbers - they tell you how many cats are nearby 
				<br> Left click: Reveal, Right click: Place a Paw
			</p>

			<!-- Create the scoreboard, fill table headers & set IDs for table data -->
			<table class="position">
				<tr>
					<th> Score </th>
					<th> High Score </th>
					<th> Paws Left </th>
				</tr>
				<tr>
					<td id = "score"></td>
					<td id = "highScore">0</td>
					<td id = "pawsLeft"></td>
				</tr>
			</table>

			<!-- 1x1 Table to display the gamestate -->
			<table class="position">
				<tr>
					<td id = "OUTCOME"></td>
				</tr>
			</table>
			<br>

			<!-- Place the gameboard -->
			<div id = "gameBoard"></div>
			<br>

			<!-- Create Restart button & difficulty dropdown menu. -->
			<button class="button" type="button" name = "restart" onclick="resetGame()"> Restart </button>
			<label class = "labelTxt" for = "difficulty"> Choose a difficulty: </label>
			
			<select name="diffDropDown" id = "difficulty">
				<option value = "1"> Easy </option>
				<option value = "2"> Intermediate </option>
				<option value = "3"> Hard </option>
			</select>
			
			<!-- Upload & Download options. Upload exclusively accepts JSON files. -->
			<label class="labelTxt" >Upload Highscore: </label>
			<input class="button" accept = ".json" type="file" id="selectFile" name = "uploadHS"></button>
			<button class="button" type="button" id = "downloadFile"> Download Highscore </button>	

		</section>

		<!-- Purely decorative paw. -->
		<img src="assets/images/paw.png" id="bigPaw">
	</body>
	

</html>
